  <!-- ══ 입장 코드 화면 ══ -->
  <div id="screen-entry" class="screen-entry">
    <div class="entry-card">
      <div class="entry-brand"><b>OH</b>travel</div>
      <p class="entry-desc">입장 코드를 입력하세요</p>
      <input class="inp" id="inp-entry-code" type="password" placeholder="입장 코드"
        onkeydown="if(event.key==='Enter')document.getElementById('btn-entry-submit').click()" />
      <button class="btn accent" id="btn-entry-submit" style="width:100%;margin-top:6px;">입장</button>
      <div id="entry-error" class="entry-error" style="display:none;">잘못된 입장 코드입니다</div>
    </div>
  </div>

  <nav class="nav">
    <div class="brand"><b>OH</b>travel</div>
    <div class="nav-end" id="nav-end">
      <button class="icon-action" id="btn-settings" title="설정"><svg class="ic" width="16" height="16"><use href="#ic-gear"/></svg></button>
    </div>
  </nav>

  <!-- ══ VIEW: 대시보드 ══ -->
  <div id="view-dashboard" class="view wrap" style="display:none;">
    <header class="section">
      <div class="t-large">내 여행 목록</div>
      <p style="margin-top:6px;color:var(--text-2);font-size:.95rem;">등록된 여행을 선택하거나 새 여행을 추가하세요.</p>
    </header>
    <div class="section">
      <button class="btn accent" id="btn-new-trip">+ 새 여행 등록</button>
    </div>
    <div id="offline-banner" class="offline-banner" style="display:none;">오프라인 모드 — 캐시된 데이터를 표시합니다.</div>
    <div id="trip-list" class="grid"></div>
    <div id="trip-list-empty" class="empty-state" style="display:none;">
      <div class="empty-icon"><svg width="48" height="48"><use href="#ic-compass"/></svg></div>
      <div class="t-head">등록된 여행이 없습니다</div>
      <p class="t-cap">새 여행을 등록하여 계획을 시작하세요.</p>
    </div>
  </div>

  <!-- ══ VIEW: 타임라인 ══ -->
  <div id="view-timeline" class="view" style="display:none;">
    <div class="timeline-layout">

      <!-- 사이드바 (PC) -->
      <aside id="timeline-sidebar" class="timeline-sidebar"></aside>

      <!-- 메인 콘텐츠 -->
      <div class="timeline-content">
        <header class="section timeline-header">
          <button class="btn ghost btn-back" id="btn-back" style="display:none;">← 전체 여행 목록</button>
          <div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;">
            <div>
              <div id="trip-title-display" class="t-large"></div>
              <div id="trip-date-range" class="t-cap" style="margin-top:4px;font-size:.9rem;text-transform:none;letter-spacing:normal;"></div>
            </div>
            <button class="icon-action" id="btn-edit-trip" title="여행 편집" style="margin-top:6px;display:none;"><svg class="ic" width="16" height="16"><use href="#ic-edit"/></svg></button>
          </div>
          <!-- 모바일/태블릿용 액션 버튼 -->
          <div class="timeline-header-actions" id="timeline-header-actions"></div>
        </header>

        <!-- 여행 상태: 진행률 + 숙소 미정 + 날짜 이동 -->
        <div id="trip-status-wrap"></div>

        <!-- 타임라인 카드들 -->
        <div id="timeline-list" class="timeline-list"></div>
      </div>
    </div>
  </div>

  <!-- ════════════════════ MODALS ════════════════════ -->

  <!-- 새 여행 등록 -->
  <div class="modal" id="modal-new-trip" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-card">
      <div class="t-head" style="margin-bottom:16px;">새 여행 등록</div>
      <div class="field"><label>여행 제목</label><input class="inp" id="inp-trip-title" placeholder="예: 2025 동남아 배낭여행" /></div>
      <div class="field"><label>시작일</label><input type="date" class="inp" id="inp-trip-start" /></div>
      <div class="field"><label>종료일</label><input type="date" class="inp" id="inp-trip-end" /></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="btn ghost" id="btn-cancel-new-trip">취소</button>
        <button class="btn accent" id="btn-save-new-trip">등록</button>
      </div>
    </div>
  </div>

  <!-- 여행 편집 -->
  <div class="modal" id="modal-edit-trip" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-card">
      <div class="t-head" style="margin-bottom:16px;">여행 편집</div>
      <div class="field"><label>여행 제목</label><input class="inp" id="inp-edit-trip-title" /></div>
      <div class="field"><label>시작일</label><input type="date" class="inp" id="inp-edit-trip-start" /></div>
      <div class="field"><label>종료일</label><input type="date" class="inp" id="inp-edit-trip-end" /></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="btn ghost" onclick="document.getElementById('modal-edit-trip').classList.remove('open')">취소</button>
        <button class="btn accent" id="btn-save-edit-trip">저장</button>
      </div>
    </div>
  </div>

  <!-- 교통 등록/편집 -->
  <div class="modal" id="modal-transport" onclick="if(event.target===this)closeTransportModal()">
    <div class="modal-card" style="width:min(580px,96vw);">
      <div class="t-head" style="margin-bottom:16px;" id="modal-transport-title">교통 등록</div>
      <div class="field"><label>교통 수단</label>
        <select class="inp" id="inp-trans-type">
          <option value="flight">비행기</option>
          <option value="train">기차</option>
          <option value="ship">배</option>
          <option value="bus">버스</option>
        </select>
      </div>
      <div class="form-row-2">
        <div class="field"><label>출발 도시 / 공항코드</label><input class="inp" id="inp-trans-from-city" placeholder="서울 / ICN" /></div>
        <div class="field"><label>도착 도시 / 공항코드</label><input class="inp" id="inp-trans-to-city" placeholder="방콕 / BKK" /></div>
      </div>
      <div class="form-row-2">
        <div class="field"><label>출발 날짜</label><input type="date" class="inp" id="inp-trans-depart-date" /></div>
        <div class="field"><label>출발 시간</label><input type="time" class="inp" id="inp-trans-depart-time" /></div>
      </div>
      <div class="form-row-2">
        <div class="field"><label>도착 날짜</label><input type="date" class="inp" id="inp-trans-arrive-date" /></div>
        <div class="field"><label>도착 시간</label><input type="time" class="inp" id="inp-trans-arrive-time" /></div>
      </div>
      <div class="field"><label>편명 / 예약번호</label><input class="inp" id="inp-trans-booking" placeholder="KE123" /></div>
      <div class="field"><label>메모</label><textarea class="inp" id="inp-trans-memo" rows="2" placeholder="터미널 정보 등"></textarea></div>
      <div style="display:flex;gap:8px;justify-content:space-between;margin-top:8px;">
        <button class="btn sm danger" id="btn-delete-transport" style="display:none;">삭제</button>
        <div style="display:flex;gap:8px;margin-left:auto;">
          <button class="btn ghost" onclick="closeTransportModal()">취소</button>
          <button class="btn accent" id="btn-save-transport">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 일정 일괄 편집 -->
  <div class="modal" id="modal-bulk-edit" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-card" style="width:min(640px,96vw);max-height:88vh;display:flex;flex-direction:column;">
      <div class="t-head" style="margin-bottom:4px;">일정 일괄 편집</div>
      <p class="t-cap" style="margin-bottom:14px;text-transform:none;letter-spacing:normal;">여러 날짜의 도시·테마·숙소를 한 화면에서 채워 넣으세요.</p>
      <div id="bulk-edit-list" style="overflow-y:auto;flex:1;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--hairline);">
        <button class="btn ghost" onclick="document.getElementById('modal-bulk-edit').classList.remove('open')">취소</button>
        <button class="btn accent" id="btn-save-bulk-edit">저장</button>
      </div>
    </div>
  </div>

  <!-- 날짜 카드 편집 -->
  <div class="modal" id="modal-edit-day" onclick="if(event.target===this)closeEditModal()">
    <div class="modal-card" style="width:min(560px,96vw);max-height:92vh;display:flex;flex-direction:column;">
      <div class="t-head" style="margin-bottom:12px;" id="modal-day-title">편집</div>
      <div style="overflow-y:auto;flex:1;padding:4px 0;">
        <div class="field"><label>오늘의 테마</label><input class="inp" id="inp-theme" placeholder="예: 방콕 시내 탐방, 이동의 날" /></div>
        <div class="field"><label>방문 도시</label><input class="inp" id="inp-city" placeholder="예: 방콕, 파리, 도쿄" /></div>
        <div class="field">
          <label>교통편</label>
          <div id="edit-day-transport-list" class="edit-day-transport-list"></div>
          <button type="button" class="btn sm ghost" id="btn-add-trans-inline" style="margin-top:6px;"><svg class="ic" width="14" height="14"><use href="#ic-plane"/></svg> 교통 추가</button>
        </div>
        <div class="field"><label>숙소 이름</label><input class="inp" id="inp-accom-name" placeholder="숙소 이름" /></div>
        <div class="field"><label>숙소 구글맵 링크</label><input class="inp" id="inp-accom-map" placeholder="https://maps.google.com/..." /></div>
        <div class="field"><label>숙소 메모</label><input class="inp" id="inp-accom-memo" placeholder="체크인 시간, 도어코드 등" /></div>
        <div class="field"><label>메모 / 일기</label>
          <textarea class="inp" id="inp-memo" rows="4" placeholder="오늘의 기록..."></textarea>
        </div>
        <div class="field"><label>To-Do 항목 <span style="font-weight:400;color:var(--text-3)">(줄바꿈으로 구분, 맨 앞에 "10:00" 형식으로 시간 추가 가능)</span></label>
          <textarea class="inp" id="inp-todos" rows="3" placeholder="10:00 박물관 예약&#10;환전하기"></textarea>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--hairline);">
        <button class="btn ghost" onclick="closeEditModal()">취소</button>
        <button class="btn accent" id="btn-save-day">저장</button>
      </div>
    </div>
  </div>


  <!-- 준비물 -->
  <div class="modal" id="modal-packing" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-card" style="width:min(500px,96vw);max-height:88vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="t-head">준비물 체크리스트</div>
        <button class="btn ghost sm" onclick="document.getElementById('modal-packing').classList.remove('open')">닫기</button>
      </div>
      <div class="packing-templates">
        <button class="btn sm ghost" id="tpl-basic">기본 템플릿 적용</button>
      </div>
      <div class="todo-add-row" style="margin:12px 0;">
        <input class="todo-add-inp" id="inp-packing-item" placeholder="준비물 추가..."
          onkeydown="if(event.key==='Enter')addPackingItem()" />
        <button class="btn sm icon-btn" onclick="addPackingItem()">+</button>
      </div>
      <ul class="todo-list" id="packing-list"></ul>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--hairline);display:flex;justify-content:space-between;align-items:center;">
        <span class="t-cap" id="packing-progress"></span>
        <button class="btn sm danger" id="btn-clear-packing">완료 항목 삭제</button>
      </div>
    </div>
  </div>

  <!-- 설정 -->
  <div class="modal" id="modal-settings" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="t-head" style="display:flex;align-items:center;gap:8px;"><svg class="ic" width="18" height="18"><use href="#ic-gear"/></svg> 설정</div>
        <button class="btn ghost sm" onclick="document.getElementById('modal-settings').classList.remove('open')">닫기</button>
      </div>
      <div class="field"><label>입장 코드 변경</label>
        <input class="inp" id="inp-new-entry-code" placeholder="새 입장 코드" /></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="btn accent" id="btn-save-settings">저장</button>
      </div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--hairline);">
        <button class="btn ghost sm" id="btn-logout" style="width:100%;">로그아웃</button>
      </div>
    </div>
  </div>

  <!-- 데이터 백업 -->
  <div class="modal" id="modal-data-io" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-card" style="width:min(420px,96vw);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="t-head">데이터 백업</div>
        <button class="btn ghost sm" onclick="document.getElementById('modal-data-io').classList.remove('open')">닫기</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn" id="btn-export-json" style="justify-content:flex-start;gap:10px;">
          <span class="ic-tile"><svg class="ic" width="17" height="17"><use href="#ic-folder"/></svg></span><div><div style="font-weight:600;font-size:.9rem;">전체 백업 (JSON)</div><div style="font-size:.78rem;color:var(--text-3);font-weight:400;">모든 데이터 완전 백업</div></div>
        </button>
        <button class="btn" id="btn-import-json" style="justify-content:flex-start;gap:10px;">
          <span class="ic-tile"><svg class="ic" width="17" height="17"><use href="#ic-folder"/></svg></span><div><div style="font-weight:600;font-size:.9rem;">백업 복원</div><div style="font-size:.78rem;color:var(--text-3);font-weight:400;">기존 데이터를 덮어씁니다</div></div>
        </button>
      </div>
    </div>
  </div>
  <!-- hidden file input -->
  <input type="file" id="file-import-json" accept=".json" style="display:none;" />

  <div class="toast" id="toast">
    <span id="toast-msg"></span>
    <button class="toast-undo" id="toast-undo" style="display:none;" onclick="undoDelete()">되돌리기</button>
  </div>

</body>
</html>
